baseURL = "https://swlacy.com"
languageCode = "en-us"
title = "Sid's Blog"

theme = "hugo-mintek-theme"

[params]
    author = "Sid Lacy"
    headshot = "/headshot.png"
    profileBgPath = "/profileBg.jpg"
    license = "MIT License"
    licenseLink = "https://opensource.org/licenses/MIT"
    attributionPage = "/attribution"
    authorPage = "/about"
    resumeLink = "/resume"
    repoLink = "https://github.com/lacysw/blog"
    logoPath = "/logo.png"
    showLastBuilt = true
    showCommitHash = true
    showCommand = true
    email = "contact@swlacy.com"
    tagline = "Hi there!"
    subTagline = "My name is Sid Lacy"
    subSubTagline = "I ramble about security and technology"
    footnote = "Hey there! Thanks for taking the time to read this post. I hope it was interesting and informative. Notice something in need of improvement? Please, do not hesitate to let me know via email or git pull request. Kind regards, Sid."

