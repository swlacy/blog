baseURL: 'https://swlacy.com'
languageCode: en-us
title: Sid's Blog
theme: hugo-mintek-theme

params:
  author: Sid Lacy
  license: MIT License
  licenseLink: 'https://opensource.org/licenses/MIT'
  attributionPage: /attribution
  authorPage: /about
  resumeLink: /resume
  repoLink: 'https://github.com/lacysw/blog'
  logoPath: /logo.png
  showLastBuilt: true
  showCommitHash: true
  showCommand: true
  email: contact@swlacy.com
  headshot: /headshot.webp
  indexBg: /indexBg.webp
  indexTitle: Greetings!
  indexSubTitle: >-
    My name is Sid Lacy – I ramble about security and technology. This is my personal website, which
    I use to publish technical articles of all kinds related to my cybersecurity learning journey.
    Take a look!
  footnote: >-
    Hey there! Thanks for taking the time to read this post. I hope it was
    interesting and informative. Notice something in need of improvement?
    Please, do not hesitate to let me know via email or git pull request. Kind
    regards, Sid.

menu:
  header:
    - name: Posts
      pre: folder-open
      url: /posts
      weight: 1
    - name: About Me
      pre: user
      url: /about
      weight: 2
    - name: Contact
      pre: heart-handshake
      url: 'mailto:contact@swlacy.com?subject=Hello!'
      weight: 3
  socials:
    - name: Email
      pre: mail
      url: 'mailto:contact@swlacy.com?subject=Hello!'
      weight: 1
    - name: Twitter
      pre: twitter
      url: 'https://twitter.com/actuallysid'
      weight: 2
    - name: LinkedIn
      pre: linkedin
      url: 'https://linkedin.com/in/lacysw'
      weight: 3
    - name: GitHub
      pre: github
      url: 'https://github.com/lacysw'
      weight: 4

enableGitInfo: true
pygmentsOptions: linenos=inline

markup:
  highlight:
    tabWidth: 4
    noClasses: false
    style: solarized-dark256


frontmatter:
  date:
    - date
    - publishDate
    - lastmod
  lastmod:
    - lastmod
    - ':git'
    - date
    - publishDate
