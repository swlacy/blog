baseURL = "https://swlacy.com"
languageCode = "en-us"
title = "Sid's Blog"

theme = "hugo-port-theme"
enableGitInfo = true

pygmentsOptions = "linenos=inline"

[markup]
  [markup.highlight]
    style = 'lovelace'
    tabWidth = 4

[frontmatter]
    date = ["date", "publishDate", "lastmod"]
    lastmod = ["lastmod", ":git", "date", "publishDate"]

[params]
    author = "Sid Lacy"
    license = "MIT License"
    licenseLink = "https://opensource.org/licenses/MIT"
    attributionPage = "/attribution"
    authorPage = "/about"
    repoLink = "https://github.com/lacysw/blog"
    logoPath = "/logo.png"
    showLastBuilt = true
    showCommitHash = true
    email = "contact@swlacy.com"
    footnote = "Hey there! Thanks for taking the time to read this post. Notice something in need of improvement? Please, do not hesitate to let me know via email or a git PR. Kind regards."
